<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iconic Signs FL — Quote Calculator</title>

<style>
body {background:#111;color:#eee;font-family:Arial;padding:20px}
input,select{width:100%;padding:8px;margin-bottom:10px;background:#222;border:1px solid #444;color:#fff}
button{padding:10px 16px;background:#d4a853;border:none;cursor:pointer}
.result{margin-top:20px;padding:10px;background:#222}
.hidden{display:none}
.toggle{margin-bottom:20px}
</style>
</head>

<body>

<h2>Iconic Signs Quote Calculator</h2>

<div class="toggle">
<button onclick="setMode('simple')">Simple</button>
<button onclick="setMode('advanced')">Advanced</button>
</div>

<div>
<label>Description</label>
<input id="desc" value="parking signs">

<label>Qty</label>
<input id="qty" type="number" value="4">

<label>Width (in)</label>
<input id="w" type="number" value="12">

<label>Height (in)</label>
<input id="h" type="number" value="12">
</div>

<div id="advanced" class="hidden">

<label>Sheet Width</label>
<input id="sheetW" value="48">

<label>Sheet Height</label>
<input id="sheetH" value="96">

<label>Material Cost</label>
<input id="sheetCost" value="63.24">

<label>Print Margin %</label>
<input id="margin" value="30">

<label>Gap</label>
<input id="gap" value="0.25">

<label>Edge Margin</label>
<input id="edge" value="0.5">

<label>Minimum Job</label>
<input id="minJob" value="0">

</div>

<div id="simple">

<label>Sell Price ($/ft²)</label>
<input id="rate" value="14">

</div>

<br>
<button onclick="calc()">Calculate</button>

<div class="result" id="out"></div>

<script>

let mode = "simple";

function setMode(m){
mode = m;
document.getElementById("advanced").classList.toggle("hidden", m !== "advanced");
document.getElementById("simple").classList.toggle("hidden", m !== "simple");
}

function calc(){

let qty = parseFloat(qtyEl().value);
let w = parseFloat(wEl().value);
let h = parseFloat(hEl().value);

let sqftEach = (w*h)/144;
let totalSqft = sqftEach * qty;

if(mode === "simple"){

let rate = parseFloat(rateEl().value);
let sell = totalSqft * rate;

out().innerHTML = `
SqFt: ${totalSqft.toFixed(2)}<br>
Sell: $${sell.toFixed(2)}
`;

return;
}

// ADVANCED MODE

let sheetW = parseFloat(sheetWEl().value);
let sheetH = parseFloat(sheetHEl().value);
let sheetCost = parseFloat(sheetCostEl().value);
let margin = parseFloat(marginEl().value)/100;
let gap = parseFloat(gapEl().value);
let edge = parseFloat(edgeEl().value);
let minJob = parseFloat(minJobEl().value);

// effective size
let partW = w + gap*2;
let partH = h + gap*2;

// usable sheet
let usableW = sheetW - edge*2;
let usableH = sheetH - edge*2;

let fitX = Math.floor(usableW / partW);
let fitY = Math.floor(usableH / partH);

let perSheet = fitX * fitY;

if(perSheet <= 0){
out().innerHTML = "Does not fit sheet";
return;
}

let sheets = Math.ceil(qty / perSheet);

let materialCost = sheets * sheetCost;

// basic production estimate
let cost = materialCost;

// markup
let sell = Math.max(
cost * (1 + margin),
totalSqft * 14,
minJob
);

out().innerHTML = `
SqFt Each: ${sqftEach.toFixed(2)}<br>
Total SqFt: ${totalSqft.toFixed(2)}<br><br>

Per Sheet: ${perSheet}<br>
Sheets Needed: ${sheets}<br><br>

Cost: $${cost.toFixed(2)}<br>
Sell: $${sell.toFixed(2)}
`;

}

// shortcuts
const qtyEl=()=>document.getElementById("qty");
const wEl=()=>document.getElementById("w");
const hEl=()=>document.getElementById("h");
const rateEl=()=>document.getElementById("rate");
const sheetWEl=()=>document.getElementById("sheetW");
const sheetHEl=()=>document.getElementById("sheetH");
const sheetCostEl=()=>document.getElementById("sheetCost");
const marginEl=()=>document.getElementById("margin");
const gapEl=()=>document.getElementById("gap");
const edgeEl=()=>document.getElementById("edge");
const minJobEl=()=>document.getElementById("minJob");
const out=()=>document.getElementById("out");

</script>

</body>
</html>
