<script>
let mode = "simple";

function setMode(m){
  mode = m;
  document.getElementById("advanced").classList.toggle("hidden", m !== "advanced");
  document.getElementById("simple").classList.toggle("hidden", m !== "simple");
}

function calc() {
  let qty = parseFloat(qtyEl().value) || 0;
  let w = parseFloat(wEl().value) || 0;
  let h = parseFloat(hEl().value) || 0;

  if (qty <= 0 || w <= 0 || h <= 0) {
    out().innerHTML = "Enter valid quantity, width, and height.";
    return;
  }

  let sqftEach = (w * h) / 144;
  let totalSqft = sqftEach * qty;

  if (mode === "simple") {
    let rate = parseFloat(rateEl().value) || 0;
    let sell = totalSqft * rate;

    out().innerHTML = `
SqFt Each: ${sqftEach.toFixed(2)}<br>
Total SqFt: ${totalSqft.toFixed(2)}<br>
Sell: $${sell.toFixed(2)}
`;
    return;
  }

  // ADVANCED MODE
  let sheetW = parseFloat(sheetWEl().value) || 0;
  let sheetH = parseFloat(sheetHEl().value) || 0;
  let sheetCost = parseFloat(sheetCostEl().value) || 0;
  let margin = (parseFloat(marginEl().value) || 0) / 100;
  let gap = parseFloat(gapEl().value) || 0;
  let edge = parseFloat(edgeEl().value) || 0;
  let minJob = parseFloat(minJobEl().value) || 0;

  if (sheetW <= 0 || sheetH <= 0 || sheetCost < 0) {
    out().innerHTML = "Enter valid sheet size and material cost.";
    return;
  }

  // usable sheet after edge margins
  let usableW = sheetW - edge * 2;
  let usableH = sheetH - edge * 2;

  if (usableW <= 0 || usableH <= 0) {
    out().innerHTML = "Edge margin is too large for the selected sheet.";
    return;
  }

  // correct shared-gap nesting:
  // n * part + (n - 1) * gap <= usable
  // n <= (usable + gap) / (part + gap)
  let fitX_a = Math.floor((usableW + gap) / (w + gap));
  let fitY_a = Math.floor((usableH + gap) / (h + gap));
  let perSheet_a = fitX_a * fitY_a;

  // also test rotated orientation
  let fitX_b = Math.floor((usableW + gap) / (h + gap));
  let fitY_b = Math.floor((usableH + gap) / (w + gap));
  let perSheet_b = fitX_b * fitY_b;

  let rotated = false;
  let fitX, fitY, perSheet, partW, partH;

  if (perSheet_b > perSheet_a) {
    rotated = true;
    fitX = fitX_b;
    fitY = fitY_b;
    perSheet = perSheet_b;
    partW = h;
    partH = w;
  } else {
    fitX = fitX_a;
    fitY = fitY_a;
    perSheet = perSheet_a;
    partW = w;
    partH = h;
  }

  if (perSheet <= 0) {
    out().innerHTML = "Does not fit sheet.";
    return;
  }

  let sheets = Math.ceil(qty / perSheet);
  let materialCost = sheets * sheetCost;

  // very basic cost model for now
  let cost = materialCost;

  // pricing floor logic
  let sellFromMargin = cost * (1 + margin);
  let sellFromSqFt = totalSqft * 14;
  let sell = Math.max(sellFromMargin, sellFromSqFt, minJob);

  out().innerHTML = `
Description: ${descEl().value}<br>
Qty: ${qty}<br>
Finished Size: ${w.toFixed(2)}" × ${h.toFixed(2)}"<br>
SqFt Each: ${sqftEach.toFixed(2)}<br>
Total SqFt: ${totalSqft.toFixed(2)}<br><br>

Sheet Size: ${sheetW.toFixed(2)}" × ${sheetH.toFixed(2)}" (${((sheetW * sheetH) / 144).toFixed(2)} sq ft)<br>
Edge Margin: ${edge.toFixed(2)}"<br>
Usable Sheet Area: ${usableW.toFixed(2)}" × ${usableH.toFixed(2)}"<br>
Part Gap: ${gap.toFixed(2)}"<br>
Best Orientation: ${rotated ? "Rotated" : "Standard"}<br>
Layout: ${fitX} across × ${fitY} down<br>
Per Sheet: ${perSheet}<br>
Sheets Needed: ${sheets}<br><br>

Material Cost: $${materialCost.toFixed(2)}<br>
Cost: $${cost.toFixed(2)}<br>
Sell: $${sell.toFixed(2)}
`;
}

const descEl = () => document.getElementById("desc");
const qtyEl = () => document.getElementById("qty");
const wEl = () => document.getElementById("w");
const hEl = () => document.getElementById("h");
const rateEl = () => document.getElementById("rate");
const sheetWEl = () => document.getElementById("sheetW");
const sheetHEl = () => document.getElementById("sheetH");
const sheetCostEl = () => document.getElementById("sheetCost");
const marginEl = () => document.getElementById("margin");
const gapEl = () => document.getElementById("gap");
const edgeEl = () => document.getElementById("edge");
const minJobEl = () => document.getElementById("minJob");
const out = () => document.getElementById("out");
</script>
