<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Iconic Signs Calculator</title>
<style>
body { background:#111; color:#eee; font-family:Arial; }
input, select { padding:6px; margin:4px; }
button { padding:10px; background:#d4a853; border:none; cursor:pointer; }
</style>
</head>
<body>

<h2>Iconic Signs Calculator (Fixed)</h2>

<label>Description</label><br>
<input id="desc" value="parking signs"><br>

<label>Qty</label><br>
<input id="qty" value="4"><br>

<label>Width (in)</label><br>
<input id="w" value="12"><br>

<label>Height (in)</label><br>
<input id="h" value="12"><br>

<label>Material Cost (sheet)</label><br>
<input id="sheet" value="63.24"><br>

<label>Sell Price ($/ft²)</label><br>
<input id="rate" value="14"><br>

<br>

<button onclick="calc()">Calculate + Add</button>

<h3>Result</h3>
<div id="out">No items yet</div>

<script>

function calc() {

  var qty = parseFloat(document.getElementById('qty').value) || 0;
  var w = parseFloat(document.getElementById('w').value) || 0;
  var h = parseFloat(document.getElementById('h').value) || 0;
  var sheet = parseFloat(document.getElementById('sheet').value) || 0;
  var rate = parseFloat(document.getElementById('rate').value) || 0;

  if (qty <= 0 || w <= 0 || h <= 0) {
    alert("Invalid inputs");
    return;
  }

  // sqft
  var sqft = (w * h) / 144 * qty;

  // simple cost model
  var materialCost = sheet;
  var labor = sqft * 2;
  var cost = materialCost + labor;

  // sell
  var price = Math.max(sqft * rate, cost * 1.75, 75);

  document.getElementById('out').innerHTML =
    "SqFt: " + sqft.toFixed(2) + "<br>" +
    "Cost: $" + cost.toFixed(2) + "<br>" +
    "Sell: $" + price.toFixed(2);

}

</script>

</body>
</html>
