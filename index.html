<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iconic Signs Quote Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      max-width: 900px;
      margin: 30px auto;
      padding: 20px;
    }

    h1 {
      margin-bottom: 24px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      width: auto;
      background: #c79a3b;
      color: #000;
      border: none;
      cursor: pointer;
      padding: 12px 18px;
      font-weight: bold;
      margin-top: 10px;
    }

    button:hover {
      opacity: 0.9;
    }

    .result {
      margin-top: 32px;
      padding: 20px;
      background: #1c1c1c;
      border: 1px solid #333;
    }

    .result-line {
      margin: 8px 0;
    }

    .error {
      color: #ff6b6b;
      margin-top: 16px;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    hr {
      border: 0;
      border-top: 1px solid #333;
      margin: 16px 0;
    }

    @media (max-width: 640px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <h1>Iconic Signs Quote Calculator</h1>

  <div class="field">
    <label for="description">Description</label>
    <input type="text" id="description" value="parking signs" />
  </div>

  <div class="grid">
    <div class="field">
      <label for="qty">Qty</label>
      <input type="number" id="qty" value="8" min="1" step="1" />
    </div>

    <div class="field">
      <label for="widthIn">Width (in)</label>
      <input type="number" id="widthIn" value="12" min="0.01" step="0.01" />
    </div>

    <div class="field">
      <label for="heightIn">Height (in)</label>
      <input type="number" id="heightIn" value="12" min="0.01" step="0.01" />
    </div>

    <div class="field">
      <label for="sheetWidthIn">Sheet Width (in)</label>
      <input type="number" id="sheetWidthIn" value="48" min="1" step="0.01" />
    </div>

    <div class="field">
      <label for="sheetHeightIn">Sheet Height (in)</label>
      <input type="number" id="sheetHeightIn" value="96" min="1" step="0.01" />
    </div>

    <div class="field">
      <label for="materialCostPerSheet">Material Cost per Sheet ($)</label>
      <input type="number" id="materialCostPerSheet" value="63.24" min="0" step="0.01" />
    </div>

    <div class="field">
      <label for="printMarginPercent">Print Margin (%)</label>
      <input type="number" id="printMarginPercent" value="30" min="0" step="0.01" />
    </div>

    <div class="field">
      <label for="cutComplexity">Cut Complexity</label>
      <select id="cutComplexity">
        <option value="noCut">No Cut</option>
        <option value="simple" selected>Simple</option>
        <option value="medium">Medium</option>
        <option value="heavy">Heavy</option>
      </select>
    </div>

    <div class="field">
      <label for="partGapIn">Part Gap (in)</label>
      <input type="number" id="partGapIn" value="0.25" min="0" step="0.01" />
    </div>

    <div class="field">
      <label for="edgeMarginIn">Edge Margin (in)</label>
      <input type="number" id="edgeMarginIn" value="0.5" min="0" step="0.01" />
    </div>

    <div class="field">
      <label for="bleedAllowanceIn">Bleed / Oversize (in)</label>
      <input type="number" id="bleedAllowanceIn" value="0" min="0" step="0.01" />
    </div>

    <div class="field">
      <label for="minimumJobCharge">Minimum Job Charge ($)</label>
      <input type="number" id="minimumJobCharge" value="0" min="0" step="0.01" />
    </div>
  </div>

  <button onclick="calculateQuote()">Calculate</button>

  <div id="error" class="error"></div>

  <div id="result" class="result" style="display:none;">
    <h2>Result</h2>
    <div id="resultContent"></div>
  </div>

  <script>
    function money(value) {
      return Number(value).toLocaleString("en-US", {
        style: "currency",
        currency: "USD"
      });
    }

    function number(value) {
      return Number(value).toLocaleString("en-US", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function calculateQuote() {
      const errorEl = document.getElementById("error");
      const resultEl = document.getElementById("result");
      const resultContent = document.getElementById("resultContent");

      errorEl.textContent = "";
      resultEl.style.display = "none";
      resultContent.innerHTML = "";

      try {
        const description = document.getElementById("description").value.trim();
        const qty = Number(document.getElementById("qty").value);
        const widthIn = Number(document.getElementById("widthIn").value);
        const heightIn = Number(document.getElementById("heightIn").value);
        const sheetWidthIn = Number(document.getElementById("sheetWidthIn").value);
        const sheetHeightIn = Number(document.getElementById("sheetHeightIn").value);
        const materialCostPerSheet = Number(document.getElementById("materialCostPerSheet").value);
        const printMarginPercent = Number(document.getElementById("printMarginPercent").value);
        const cutComplexity = document.getElementById("cutComplexity").value;
        const partGapIn = Number(document.getElementById("partGapIn").value);
        const edgeMarginIn = Number(document.getElementById("edgeMarginIn").value);
        const bleedAllowanceIn = Number(document.getElementById("bleedAllowanceIn").value);
        const minimumJobCharge = Number(document.getElementById("minimumJobCharge").value);

        if (!qty || qty <= 0) throw new Error("Qty must be greater than 0.");
        if (!widthIn || widthIn <= 0) throw new Error("Width must be greater than 0.");
        if (!heightIn || heightIn <= 0) throw new Error("Height must be greater than 0.");
        if (!sheetWidthIn || sheetWidthIn <= 0) throw new Error("Sheet width must be greater than 0.");
        if (!sheetHeightIn || sheetHeightIn <= 0) throw new Error("Sheet height must be greater than 0.");
        if (materialCostPerSheet < 0) throw new Error("Material cost cannot be negative.");
        if (printMarginPercent < 0) throw new Error("Print margin cannot be negative.");
        if (partGapIn < 0) throw new Error("Part gap cannot be negative.");
        if (edgeMarginIn < 0) throw new Error("Edge margin cannot be negative.");
        if (bleedAllowanceIn < 0) throw new Error("Bleed / oversize cannot be negative.");
        if (minimumJobCharge < 0) throw new Error("Minimum job charge cannot be negative.");

        const cncRates = {
          noCut: 0,
          simple: 50,
          medium: 75,
          heavy: 125
        };

        const pieceSqFt = (widthIn * heightIn) / 144;
        const totalSqFt = pieceSqFt * qty;
        const sheetSqFt = (sheetWidthIn * sheetHeightIn) / 144;

        const usableSheetWidth = sheetWidthIn - (edgeMarginIn * 2);
        const usableSheetHeight = sheetHeightIn - (edgeMarginIn * 2);

        if (usableSheetWidth <= 0 || usableSheetHeight <= 0) {
          throw new Error("Edge margins leave no usable sheet area.");
        }

        const effectiveWidth = widthIn + bleedAllowanceIn;
        const effectiveHeight = heightIn + bleedAllowanceIn;

        if (effectiveWidth <= 0 || effectiveHeight <= 0) {
          throw new Error("Effective piece size must be greater than 0.");
        }

        const pitchX = effectiveWidth + partGapIn;
        const pitchY = effectiveHeight + partGapIn;

        const piecesPerRow = Math.floor((usableSheetWidth + partGapIn) / pitchX);
        const piecesPerCol = Math.floor((usableSheetHeight + partGapIn) / pitchY);
        const piecesPerSheet = piecesPerRow * piecesPerCol;

        if (piecesPerSheet === 0) {
          throw new Error("Piece size plus margins/gaps will not fit on the selected sheet.");
        }

        const sheetsUsed = Math.ceil(qty / piecesPerSheet);
        const materialCost = sheetsUsed * materialCostPerSheet;
        const printSell = materialCost * (1 + printMarginPercent / 100);
        const cncCharge = sheetsUsed * (cncRates[cutComplexity] || 0);
        const subtotal = printSell + cncCharge;
        const finalSell = Math.max(subtotal, minimumJobCharge);
        const pricePerPiece = finalSell / qty;

        resultContent.innerHTML = `
          <div class="result-line"><strong>Description:</strong> ${description || "-"}</div>
          <div class="result-line"><strong>Qty:</strong> ${qty}</div>
          <div class="result-line"><strong>Finished Size:</strong> ${number(widthIn)}" × ${number(heightIn)}"</div>
          <div class="result-line"><strong>Sq Ft Each:</strong> ${number(pieceSqFt)}</div>
          <div class="result-line"><strong>Total Sq Ft:</strong> ${number(totalSqFt)}</div>
          <hr>
          <div class="result-line"><strong>Sheet Size:</strong> ${number(sheetWidthIn)}" × ${number(sheetHeightIn)}" (${number(sheetSqFt)} sq ft)</div>
          <div class="result-line"><strong>Edge Margin:</strong> ${number(edgeMarginIn)}"</div>
          <div class="result-line"><strong>Usable Sheet Area:</strong> ${number(usableSheetWidth)}" × ${number(usableSheetHeight)}"</div>
          <div class="result-line"><strong>Part Gap:</strong> ${number(partGapIn)}"</div>
          <div class="result-line"><strong>Bleed / Oversize:</strong> ${number(bleedAllowanceIn)}"</div>
          <div class="result-line"><strong>Effective Part Size for Nesting:</strong> ${number(effectiveWidth)}" × ${number(effectiveHeight)}"</div>
          <div class="result-line"><strong>Pieces Per Row:</strong> ${piecesPerRow}</div>
          <div class="result-line"><strong>Pieces Per Column:</strong> ${piecesPerCol}</div>
          <div class="result-line"><strong>Pieces Per Sheet:</strong> ${piecesPerSheet}</div>
          <div class="result-line"><strong>Sheets Used:</strong> ${sheetsUsed}</div>
          <hr>
          <div class="result-line"><strong>Material Cost:</strong> ${money(materialCost)}</div>
          <div class="result-line"><strong>Print Sell:</strong> ${money(printSell)}</div>
          <div class="result-line"><strong>CNC Charge:</strong> ${money(cncCharge)}</div>
          <div class="result-line"><strong>Subtotal:</strong> ${money(subtotal)}</div>
          <div class="result-line"><strong>Minimum Job Charge:</strong> ${money(minimumJobCharge)}</div>
          <hr>
          <div class="result-line"><strong>Final Sell:</strong> ${money(finalSell)}</div>
          <div class="result-line"><strong>Price Each:</strong> ${money(pricePerPiece)}</div>
        `;

        resultEl.style.display = "block";
      } catch (err) {
        errorEl.textContent = err.message;
      }
    }

    calculateQuote();
  </script>
</body>
</html>
