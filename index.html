<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iconic Signs Quote Calculator</title>
<style>
body {
  background: #111;
  color: #eee;
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 20px;
}
h1 {
  margin-top: 0;
}
input, select {
  width: 100%;
  padding: 10px;
  margin: 6px 0 14px 0;
  background: #222;
  border: 1px solid #444;
  color: #fff;
  box-sizing: border-box;
}
button {
  padding: 14px 22px;
  background: #d4a853;
  border: none;
  color: #111;
  cursor: pointer;
  font-size: 16px;
  margin-right: 10px;
}
button:hover {
  opacity: 0.9;
}
.toggle {
  margin-bottom: 20px;
}
.hidden {
  display: none;
}
.result {
  margin-top: 24px;
  background: #1d1d1d;
  padding: 16px;
  border: 1px solid #333;
  white-space: normal;
  line-height: 1.5;
}
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
@media (max-width: 800px) {
  .grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>

<h1>Iconic Signs Quote Calculator</h1>

<div class="toggle">
  <button type="button" onclick="setMode('simple')">Simple</button>
  <button type="button" onclick="setMode('advanced')">Advanced</button>
</div>

<label>Description</label>
<input id="desc" type="text" value="parking signs">

<div class="grid">
  <div>
    <label>Qty</label>
    <input id="qty" type="number" value="8" step="1" min="1">
  </div>
  <div>
    <label>Width (in)</label>
    <input id="w" type="number" value="23.5" step="0.01" min="0">
  </div>
</div>

<div class="grid">
  <div>
    <label>Height (in)</label>
    <input id="h" type="number" value="23.5" step="0.01" min="0">
  </div>
  <div id="simple">
    <label>Sell Price ($/ft²)</label>
    <input id="rate" type="number" value="14" step="0.01" min="0">
  </div>
</div>

<div id="advanced">
  <div class="grid">
    <div>
      <label>Sheet Width</label>
      <input id="sheetW" type="number" value="48" step="0.01" min="0">
    </div>
    <div>
      <label>Sheet Height</label>
      <input id="sheetH" type="number" value="96" step="0.01" min="0">
    </div>
  </div>

  <div class="grid">
    <div>
      <label>Material Cost / Sheet</label>
      <input id="sheetCost" type="number" value="63.24" step="0.01" min="0">
    </div>
    <div>
      <label>Gap Between Parts (in)</label>
      <input id="gap" type="number" value="0" step="0.01" min="0">
    </div>
  </div>

  <div class="grid">
    <div>
      <label>Edge Margin (in)</label>
      <input id="edge" type="number" value="0" step="0.01" min="0">
    </div>
    <div>
      <label>Minimum Job</label>
      <input id="minJob" type="number" value="0" step="0.01" min="0">
    </div>
  </div>

  <div class="grid">
    <div>
      <label>Overhead / Labor Add</label>
      <input id="overhead" type="number" value="0" step="0.01" min="0">
    </div>
    <div>
      <label>CNC Cut Charge</label>
      <select id="cncCharge">
        <option value="50" selected>$50</option>
        <option value="75">$75</option>
        <option value="100">$100</option>
        <option value="125">$125</option>
        <option value="150">$150</option>
      </select>
    </div>
  </div>

  <div class="grid">
    <div>
      <label>Custom CNC Charge Override</label>
      <input id="cncCustom" type="number" value="0" step="0.01" min="0">
    </div>
    <div>
      <label>Use Pricing Method</label>
      <select id="pricingMode">
        <option value="material_plus_cnc" selected>Material + Overhead + CNC Charge</option>
        <option value="sqft_only">SqFt Only</option>
      </select>
    </div>
  </div>

  <div class="grid">
    <div>
      <label>SqFt Sell Rate (only if SqFt mode used)</label>
      <input id="sqftRate" type="number" value="14" step="0.01" min="0">
    </div>
    <div>
      <label>Note</label>
      <input id="note" type="text" value="Use CNC charge method for simple routed panels">
    </div>
  </div>
</div>

<button type="button" onclick="calc()">Calculate</button>

<div class="result" id="out">Enter values and click Calculate.</div>

<script>
let mode = "simple";

function setMode(m) {
  mode = m;
  document.getElementById("advanced").classList.toggle("hidden", m !== "advanced");
  document.getElementById("simple").classList.toggle("hidden", m !== "simple");
}

function calc() {
  const desc = document.getElementById("desc").value || "";
  const qty = parseFloat(document.getElementById("qty").value) || 0;
  const w = parseFloat(document.getElementById("w").value) || 0;
  const h = parseFloat(document.getElementById("h").value) || 0;

  if (qty <= 0 || w <= 0 || h <= 0) {
    document.getElementById("out").innerHTML = "Enter valid quantity, width, and height.";
    return;
  }

  const sqftEach = (w * h) / 144;
  const totalSqft = sqftEach * qty;

  if (mode === "simple") {
    const rate = parseFloat(document.getElementById("rate").value) || 0;
    const sell = totalSqft * rate;

    document.getElementById("out").innerHTML = `
      <strong>Description:</strong> ${escapeHtml(desc)}<br>
      <strong>Qty:</strong> ${qty}<br>
      <strong>Finished Size:</strong> ${w.toFixed(2)}" × ${h.toFixed(2)}"<br>
      <strong>SqFt Each:</strong> ${sqftEach.toFixed(2)}<br>
      <strong>Total SqFt:</strong> ${totalSqft.toFixed(2)}<br><br>
      <strong>Sell:</strong> $${sell.toFixed(2)}
    `;
    return;
  }

  const sheetW = parseFloat(document.getElementById("sheetW").value) || 0;
  const sheetH = parseFloat(document.getElementById("sheetH").value) || 0;
  const sheetCost = parseFloat(document.getElementById("sheetCost").value) || 0;
  const gap = parseFloat(document.getElementById("gap").value) || 0;
  const edge = parseFloat(document.getElementById("edge").value) || 0;
  const minJob = parseFloat(document.getElementById("minJob").value) || 0;
  const overhead = parseFloat(document.getElementById("overhead").value) || 0;
  const cncChargeSelected = parseFloat(document.getElementById("cncCharge").value) || 0;
  const cncCustom = parseFloat(document.getElementById("cncCustom").value) || 0;
  const pricingMode = document.getElementById("pricingMode").value;
  const sqftRate = parseFloat(document.getElementById("sqftRate").value) || 0;
  const note = document.getElementById("note").value || "";

  if (sheetW <= 0 || sheetH <= 0) {
    document.getElementById("out").innerHTML = "Enter valid sheet width and height.";
    return;
  }

  const usableW = sheetW - edge * 2;
  const usableH = sheetH - edge * 2;

  if (usableW <= 0 || usableH <= 0) {
    document.getElementById("out").innerHTML = "Edge margin is too large for the selected sheet.";
    return;
  }

  // Standard orientation
  const fitXStandard = Math.floor((usableW + gap) / (w + gap));
  const fitYStandard = Math.floor((usableH + gap) / (h + gap));
  const perSheetStandard = fitXStandard * fitYStandard;

  // Rotated orientation
  const fitXRotated = Math.floor((usableW + gap) / (h + gap));
  const fitYRotated = Math.floor((usableH + gap) / (w + gap));
  const perSheetRotated = fitXRotated * fitYRotated;

  let rotated = false;
  let fitX = fitXStandard;
  let fitY = fitYStandard;
  let perSheet = perSheetStandard;

  if (perSheetRotated > perSheetStandard) {
    rotated = true;
    fitX = fitXRotated;
    fitY = fitYRotated;
    perSheet = perSheetRotated;
  }

  if (perSheet <= 0) {
    document.getElementById("out").innerHTML = "Does not fit sheet.";
    return;
  }

  const sheetsNeeded = Math.ceil(qty / perSheet);
  const materialCost = sheetsNeeded * sheetCost;
  const cncCharge = cncCustom > 0 ? cncCustom : cncChargeSelected;

  let sell = 0;
  let pricingExplanation = "";

  if (pricingMode === "material_plus_cnc") {
    sell = materialCost + overhead + cncCharge;
    pricingExplanation = "Material + Overhead + CNC Charge";
  } else {
    sell = totalSqft * sqftRate;
    pricingExplanation = "SqFt pricing mode";
  }

  if (sell < minJob) {
    sell = minJob;
    pricingExplanation += " (minimum job applied)";
  }

  document.getElementById("out").innerHTML = `
    <strong>Description:</strong> ${escapeHtml(desc)}<br>
    <strong>Qty:</strong> ${qty}<br>
    <strong>Finished Size:</strong> ${w.toFixed(2)}" × ${h.toFixed(2)}"<br>
    <strong>SqFt Each:</strong> ${sqftEach.toFixed(2)}<br>
    <strong>Total SqFt:</strong> ${totalSqft.toFixed(2)}<br><br>

    <strong>Sheet Size:</strong> ${sheetW.toFixed(2)}" × ${sheetH.toFixed(2)}"<br>
    <strong>Usable Sheet:</strong> ${usableW.toFixed(2)}" × ${usableH.toFixed(2)}"<br>
    <strong>Gap:</strong> ${gap.toFixed(2)}"<br>
    <strong>Edge Margin:</strong> ${edge.toFixed(2)}"<br>
    <strong>Best Orientation:</strong> ${rotated ? "Rotated" : "Standard"}<br>
    <strong>Layout:</strong> ${fitX} across × ${fitY} down<br>
    <strong>Per Sheet:</strong> ${perSheet}<br>
    <strong>Sheets Needed:</strong> ${sheetsNeeded}<br><br>

    <strong>Material Cost:</strong> $${materialCost.toFixed(2)}<br>
    <strong>Overhead / Labor Add:</strong> $${overhead.toFixed(2)}<br>
    <strong>CNC Charge:</strong> $${cncCharge.toFixed(2)}<br>
    <strong>Pricing Method:</strong> ${pricingExplanation}<br><br>

    <strong>Final Sell:</strong> $${sell.toFixed(2)}<br><br>
    <strong>Note:</strong> ${escapeHtml(note)}
  `;
}

function escapeHtml(str) {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

setMode("simple");
</script>

</body>
</html>
