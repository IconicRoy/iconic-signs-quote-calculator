<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iconic Signs FL — Quote Calculator</title>

<style>
body { background:#111; color:#eee; font-family:Arial; margin:0; }
header { padding:15px; border-bottom:1px solid #333; display:flex; justify-content:space-between; }
.shell { display:grid; grid-template-columns:220px 1fr 300px; height:100vh; }

nav { border-right:1px solid #333; padding:10px; }
nav div { padding:10px; cursor:pointer; }
nav div:hover { background:#222; }

main { padding:20px; overflow:auto; }
aside { border-left:1px solid #333; padding:20px; }

input, select { width:100%; padding:6px; margin:5px 0; }
button { padding:10px; background:#d4a853; border:none; cursor:pointer; }

.panel { display:none; }
.panel.active { display:block; }

.item { border-bottom:1px solid #333; padding:10px 0; }
</style>
</head>

<body>

<header>
  <div>ICONIC SIGNS FL</div>
  <div>Quote System</div>
</header>

<div class="shell">

<nav>
  <div onclick="show('rta')">RTA Vinyl</div>
  <div onclick="show('uv')">UV Print</div>
  <div onclick="show('cnc')">CNC Routed</div>
  <div onclick="show('ada')">ADA</div>
</nav>

<main>

<!-- RTA -->
<div id="rta" class="panel active">
  <h3>RTA Vinyl</h3>
  <input id="rta_w" placeholder="Width">
  <input id="rta_h" placeholder="Height">
  <input id="rta_q" placeholder="Qty">
  <button onclick="addRTA()">Add</button>
</div>

<!-- UV -->
<div id="uv" class="panel">
  <h3>UV Print</h3>
  <input id="uv_w" placeholder="Width">
  <input id="uv_h" placeholder="Height">
  <input id="uv_q" placeholder="Qty">
  <select id="uv_white">
    <option value="0">No White</option>
    <option value="1">White Ink</option>
  </select>
  <button onclick="addUV()">Add</button>
</div>

<!-- CNC -->
<div id="cnc" class="panel">
  <h3>CNC Routed</h3>
  <input id="cnc_w" placeholder="Width">
  <input id="cnc_h" placeholder="Height">
  <input id="cnc_q" placeholder="Qty">
  <input id="cnc_holes" placeholder="Mount Holes">
  <button onclick="addCNC()">Add</button>
</div>

<!-- ADA -->
<div id="ada" class="panel">
  <h3>ADA</h3>
  <input id="ada_w" placeholder="Width">
  <input id="ada_h" placeholder="Height">
  <input id="ada_q" placeholder="Qty">
  <button onclick="addADA()">Add</button>
</div>

</main>

<aside>
  <h3>Quote</h3>
  <div id="quote"></div>
  <h2 id="total">$0</h2>
</aside>

</div>

<script>

let items = [];

function show(id){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function addItem(desc, cost){
  items.push({desc, cost});
  render();
}

function render(){
  let q = document.getElementById('quote');
  q.innerHTML = '';
  let total = 0;

  items.forEach(i=>{
    total += i.cost;
    q.innerHTML += `<div class="item">${i.desc} - $${i.cost.toFixed(2)}</div>`;
  });

  document.getElementById('total').innerText = '$' + total.toFixed(2);
}

/* RTA */
function addRTA(){
  let w = +rta_w.value;
  let h = +rta_h.value;
  let q = +rta_q.value;

  let sqft = (w*h/144)*q;
  let price = sqft * 8;

  addItem('RTA', price);
}

/* UV */
function addUV(){
  let w = +uv_w.value;
  let h = +uv_h.value;
  let q = +uv_q.value;
  let white = +uv_white.value;

  let sqft = (w*h/144)*q;
  let price = sqft * 12;

  if(white) price *= 1.4;

  addItem('UV Print', price);
}

/* CNC */
function addCNC(){
  let w = +cnc_w.value;
  let h = +cnc_h.value;
  let q = +cnc_q.value;
  let holes = +cnc_holes.value;

  let sqft = (w*h/144)*q;
  let price = sqft * 14 + holes * 0.5;

  addItem('CNC', price);
}

/* ADA */
function addADA(){
  let w = +ada_w.value;
  let h = +ada_h.value;
  let q = +ada_q.value;

  let price = q * 35;

  addItem('ADA', price);
}

</script>

</body>
</html>
